const remote = () => SUPABASE.url && SUPABASE.key;
const MEM = {};   // in-memory fallback (e.g. sandboxed previews without localStorage)
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return k in MEM ? MEM[k] : null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} MEM[k]=v; }
async function kvGet(k, fb=null){
  try{
    if(remote()){
      const r = await fetch(`${SUPABASE.url}/rest/v1/kv?key=eq.${encodeURIComponent(k)}&select=value`,
        {headers:{apikey:SUPABASE.key, Authorization:"Bearer "+SUPABASE.key}});
      const j = await r.json();
      return j.length ? j[0].value : fb;
    }
    const v = lsGet(k);
    return v===null ? fb : JSON.parse(v);
  }catch(e){ return fb; }
}
async function kvSet(k, v){
  try{
    if(remote()){
      await fetch(`${SUPABASE.url}/rest/v1/kv`,{method:"POST",
        headers:{apikey:SUPABASE.key,Authorization:"Bearer "+SUPABASE.key,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates"},
        body:JSON.stringify({key:k,value:v})});
      return true;
    }
    lsSet(k, JSON.stringify(v)); return true;
  }catch(e){ return false; }
}

function rng(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const SYM={
 EURUSD:{base:1.0850,vol:.0009,dg:5,ct:100000},GBPUSD:{base:1.2700,vol:.0012,dg:5,ct:100000},
 USDJPY:{base:152.40,vol:.14,dg:3,ct:1000},XAUUSD:{base:2350,vol:3.4,dg:2,ct:100},BTCUSD:{base:64200,vol:420,dg:1,ct:1}};
function gen(sym,n=700,seed){
  const s=SYM[sym],r=rng((seed||Date.now())%2**31);let p=s.base,tr=0;const out=[];
  for(let i=0;i<n;i++){
    if(r()<.06)tr=(r()-.5)*s.vol*.9;
    const o=p;let c=o+tr+(r()-.5)*s.vol*2;
    const sw=r()<.08?s.vol*(1.5+r()*2):0;
    const h=Math.max(o,c)+r()*s.vol+(r()<.5?sw:0), l=Math.min(o,c)-r()*s.vol-(r()<.5?sw:0);
    out.push({o,h,l,c});p=c;
  }
  return out;
}

  {q:"Best liquidity and cleanest moves usually occur in…",o:["Sydney session","London–New York overlap","Weekend","Lunch hour in Tokyo"],a:1,e:"The overlap concentrates the world's volume into ~3 hours."}]},

{ph:"Phase 1 · Price Action Basics",icon:"🕯️",color:"#2FD180",lessons:[

  quiz:[
  {q:"In a powerful uptrend, RSI at 78 most reasonably means…",o:["Immediate short","Strong momentum — trend intact","Guaranteed top","Broker error"],a:1,e:"Overbought readings are a FEATURE of strong trends, not a fade signal."},
  {q:"Bearish divergence is…",o:["Price lower high, RSI higher high","Price higher high, RSI lower high","Both making highs","RSI at exactly 50"],a:1,e:"Momentum failing to confirm the new price high warns of exhaustion."},
  {q:"When should RSI NOT drive a counter-trend trade?",o:["In a quiet range","During a strong trending/news-driven move","At a major HTF level with divergence","Never"],a:1,e:"Fading raw momentum on an oscillator label is how trends run you over."},
  {q:"In a bull regime, RSI pullbacks tend to find support around…",o:["10","40–50","70","90"],a:1,e:"The 40–50 zone acting as RSI floor is a trend-health signal."}]},
 {t:"MACD, Stochastic, ATR & Bollinger",deep:{
  w:"MACD = two EMAs' gap + its average (trend-momentum). Stochastic = close's position within recent range (overbought/oversold, faster than RSI). ATR = average candle range (pure volatility, no direction). Bollinger Bands = 20 SMA ± 2 standard deviations (volatility envelope).",
  h:"MACD: zero-line side = trend bias; histogram shrinking = momentum fading. Stochastic: use only WITH the trend (buy oversold in uptrends). ATR: set stops at 1.5–2× ATR and size positions from it. Bollinger: band squeeze = explosion coming; riding the band = strong trend (NOT a fade).",
  p:["ATR-based stops adapt automatically to conditions — gold vs EURUSD, calm vs news","MACD is decent at filtering trend direction on H4/Daily","Squeezes objectively flag pre-breakout compression"],
  c:["MACD lags badly — late in, late out","Stochastic fires constant false signals in trends","Touching a Bollinger band is NOT a signal by itself — the most common misuse"],
  u:"Combine one trend tool (MACD/MA) + one volatility tool (ATR) + structure. ATR belongs in EVERY system for stops/sizing.",
  n:"Don't stack five oscillators — they're all cousins of the same price data and will agree while being collectively wrong. Two indicators max.",
  tip:"If you keep one indicator forever, make it ATR. It never predicts, never lies, and quietly fixes your two biggest leaks: stops inside the noise and inconsistent risk."},
  quiz:[
  {q:"ATR measures…",o:["Trend direction","Average volatility per candle","Volume","Sentiment"],a:1,e:"True range averaged — how much the market breathes, direction-blind."},
  {q:"Price 'walking' up the upper Bollinger band signals…",o:["An automatic short","A strong trend in progress","A calm range","A gap"],a:1,e:"Band-riding is trend strength; fading it is the classic error."},
  {q:"ATR doubles. Your lot size for identical $ risk should…",o:["Double","Halve","Stay","Quadruple"],a:1,e:"Wider stop (in an ATR world) → proportionally smaller size."}]}
]},
{ph:"Phase 4 · Advanced Price Action",icon:"🧱",color:"#FF9A5C",lessons:[
 {t:"Order Blocks & Supply/Demand",deep:{
  w:"An order block is the last opposite-direction candle (or base) before an impulsive move that broke structure — the footprint of institutional accumulation. Supply/demand zones are the same idea drawn as areas.",
  h:"Qualify OBs: did the move from it cause a BOS or sweep? Is it unmitigated (price hasn't returned)? Refine to the candle body or 50% level. Entry: limit order in the zone, stop beyond it, target the next pool of liquidity.",
  p:["Entries at the origin of moves = tight stops, big RR","Objective zone rules reduce impulse entries"],
  c:["Every down-candle is NOT an order block — over-marking is epidemic","Old, multiple-times-tested zones decay"],
  u:"Fresh OBs that caused structural breaks, aligned with HTF bias, reached by a liquidity sweep.",
  n:"Skip mid-range OBs and third+ retests. If price consolidated ON the zone, the orders are spent.",
  tip:"Grade every OB before entry: caused BOS? unmitigated? HTF aligned? swept liquidity to reach it? 3/4 or no trade."},
  quiz:[
  {q:"A valid bullish order block should have…",o:["Any red candle","Caused a break of structure upward","Five retests","High RSI"],a:1,e:"No structural consequence = no institutional footprint."},
  {q:"'Unmitigated' means…",o:["Untested — price hasn't returned yet","Broken","Old","Confirmed by MACD"],a:0,e:"First return to the zone is where remaining orders sit."},
  {q:"An OB tested for the 4th time is…",o:["Stronger than ever","Likely exhausted","Guaranteed","A breaker"],a:1,e:"Each test consumes resting orders."}]},
 {t:"BOS, CHoCH & FVG",deep:{
  w:"BOS = structure breaking WITH the trend (continuation). CHoCH = the first break AGAINST it (the last higher low fails) — earliest reversal evidence. FVG = a 3-candle imbalance gap that price often revisits to 'rebalance' before continuing.",
  h:"Map structure on your HTF (H4/D1) for bias, then hunt entries on LTF: sweep → CHoCH → return to FVG/OB inside the leg → enter with stop past the sweep. This sweep→CHoCH→FVG sequence is the core SMC playbook.",
  p:["Pure structure — works without a single indicator","CHoCH gives you reversal entries near the extreme, not late"],
  c:["On low timeframes CHoCHs appear constantly — noise","Choosing which swing counts as 'structure' is a skill that takes months"],
  u:"After liquidity events at HTF levels. A CHoCH following a sweep of a major high/low is the highest-quality reversal print.",
  n:"Don't act on every M1 CHoCH — without HTF context you're day-trading static.",
  tip:"One HTF chart for the story, one LTF chart for the trigger. Two timeframes, one narrative — more and you'll find reasons for anything."},
  quiz:[
  {q:"CHoCH in an uptrend =",o:["Break above a high","Break below the last higher low","MA cross","A doji"],a:1,e:"The trend's staircase step failing is the character change."},
  {q:"FVGs form because…",o:["Brokers gap prices","One-sided aggressive orders leave an unfilled imbalance","Weekends","Indicators lag"],a:1,e:"Price moved so fast one side never traded — a magnet for rebalance."},
  {q:"The premium SMC reversal sequence is…",o:["News → hope → entry","Sweep → CHoCH → FVG/OB retrace entry","RSI 70 → short","Gap → chase"],a:1,e:"Liquidity grab, structural shift, then discounted entry."}]},
 {t:"Premium/Discount & Mitigation",deep:{
  w:"Any trading range can be split at its 50% (equilibrium): above = premium (expensive), below = discount (cheap). Institutions sell premium, buy discount. Mitigation = price returning to a zone where trapped positions/unfilled orders wait.",
  h:"Draw the dealing range (last major swing low→high), only take longs in the discount half and shorts in the premium half of your bias's range. Combine: bullish bias + discount + OB/FVG = A-grade long.",
  p:["Stops buying tops/selling bottoms — mechanically","Stacks cleanly with OB/FVG entries"],
  c:["Ranges must be drawn from the RIGHT swings — garbage range, garbage equilibrium","In runaway trends price stays premium for ages"],
  u:"Established dealing ranges after a clear impulse; pullback entries.",
  n:"Fresh breakouts/news trends — waiting for a 50% discount can mean missing the whole move; that's the tradeoff.",
  tip:"Before every entry ask one question: am I buying cheap or buying comfortable? Comfort usually lives in premium."},
  quiz:[
  {q:"Equilibrium of a dealing range is…",o:["The high","The 50% level","The low","Yesterday's close"],a:1,e:"Above = premium, below = discount."},
  {q:"With bullish bias, A-grade entries occur in…",o:["Premium","Discount","Either","Outside the range"],a:1,e:"Buy cheap in the direction of flow."},
  {q:"Mitigation refers to price returning to…",o:["The news time","Zones of trapped/unfilled institutional orders","The round number","The weekly open"],a:1,e:"Institutions defend or exit at their origin — price gets pulled back to it."}]}
]},
{ph:"Phase 5 · Smart Money Deep",icon:"🐋",color:"#F5C542",lessons:[
 {t:"Liquidity Engineering & Inducement",deep:{
  w:"Liquidity = clusters of stops and pending orders (above equal highs, below equal lows, at trendline touches). Inducement = the market DELIBERATELY building an obvious 'setup' that attracts retail entries whose stops become the fuel for the real move.",
  h:"Before entries, map where the crowd's stops are: equal highs/lows, obvious trendlines, round numbers. Expect price to RAID those pools first. Enter after the raid, not before — let the crowd be the liquidity.",
  p:["Explains 'stop hunt then reverse' — the most common retail pain — as a tradable pattern","Turns obvious levels from traps into signals"],
  c:["Can slide into paranoia — not every wick is manipulation","Requires patience to wait for the raid; you'll skip trades that 'worked'"],
  u:"When you see textbook-obvious patterns (clean equal highs, perfect trendline) assume they're bait until swept.",
  n:"Don't apply manipulation logic to genuinely news-driven moves — CPI repricing isn't a hunt, it's information.",
  tip:"The prettier and more obvious the setup looks, the more likely it exists to be swept. Beauty is bait."},
  quiz:[
  {q:"Inducement is…",o:["A broker bonus","Engineered 'setups' that attract retail orders as liquidity","A candlestick","An indicator"],a:1,e:"The crowd's entries and stops become fuel for the real move."},
  {q:"Equal lows on a chart most likely mean…",o:["A floor that will hold forever","A sell-side liquidity pool likely to be raided","Nothing","Buy immediately"],a:1,e:"Stacked stops below are a target, not a wall."},
  {q:"The disciplined response to an obvious trendline setup is…",o:["Enter instantly","Wait for the sweep/raid, then judge","Invert your account","Add to losers"],a:1,e:"Let the trap spring on someone else first."}]},
 {t:"Breakers, Mitigation Blocks & MTF Structure",deep:{
  w:"A breaker block = an order block that FAILED (was traded through) and flips polarity — old bullish OB becomes resistance. Internal structure = the small swings inside a larger leg; external = the major swing highs/lows. Multi-timeframe analysis aligns them.",
  h:"Workflow: D1/H4 external structure → directional bias. H1 internal structure → the current leg's story. M5–M15 → sweep/CHoCH trigger inside HTF zones. Breakers give entries when classic OBs fail: trade the retest of the broken zone.",
  p:["MTF alignment filters the majority of losing counter-trend impulses","Breakers catch the 'failed setup' crowd on the wrong side"],
  c:["Three timeframes can paralyze — bias, story, trigger; nothing more","Internal noise tempts you to abandon a good HTF thesis early"],
  u:"Trend-continuation entries (internal pullbacks inside external legs) and reversal confirmation at external extremes.",
  n:"Never let an M5 pattern override a D1 structure. The elephant doesn't ask the mouse for directions.",
  tip:"Write your HTF bias on paper before opening the LTF. If the LTF 'changes your mind' within minutes, you had no bias — you had a mood."},
  quiz:[
  {q:"A breaker block is…",o:["A fresh OB","A failed OB that flipped polarity","A news candle","Support forever"],a:1,e:"Zones that fail become the other side's weapon."},
  {q:"External structure refers to…",o:["Minor pullback swings","Major swing highs/lows defining the trend","Other markets","Volume"],a:1,e:"Internal = inside the leg; external = the leg itself."},
  {q:"Correct MTF hierarchy:",o:["M1 decides everything","HTF bias → mid story → LTF trigger","All equal","Daily only"],a:1,e:"Bias flows downward; triggers flow upward."}]}
]},
{ph:"Phase 6 · Fundamental Analysis",icon:"🏦",color:"#FF6FB5",lessons:[
 {t:"Interest Rates & Central Banks",deep:{
  w:"Interest rates are gravity for currencies: capital flows toward higher real yield. The Fed, ECB, BOJ, BOE, RBA and RBI set policy through rate decisions, guidance and balance-sheet operations.",
  h:"Track the EXPECTED path (futures-implied probabilities), not just current rates. Trade the surprise: if markets price a 90% hold and the bank hikes, the repricing is violent. Hawkish tone → currency up; dovish → down.",
  p:["Drives multi-month trends — the biggest moves in FX are policy-divergence trades","Scheduled events = manageable risk windows"],
  c:["Priced-in outcomes produce 'sell the news' reversals that punish naive direction bets","Two-way volatility within seconds around statements"],
  u:"Form a WEEKLY bias from policy divergence (e.g., Fed cutting while ECB holds → EURUSD bullish backdrop) and execute with technicals.",
  n:"Don't hold leveraged positions through FOMC without a plan. Don't trade the initial spike — the first move frequently reverses when the press conference starts.",
  tip:"The statement moves price; the press conference moves the TREND. The Q&A is where policy actually leaks."},
  quiz:[
  {q:"A surprise hike vs 90%-priced hold causes…",o:["Nothing — priced in","Violent repricing in the currency's favor","A gap down always","Market close"],a:1,e:"Surprises force everyone to reprice simultaneously."},
  {q:"Policy divergence (Fed cuts, ECB holds) is structurally…",o:["EURUSD bearish","EURUSD bullish","Neutral","Only gold-relevant"],a:1,e:"Yield differential shifts toward the euro."},
  {q:"'Dovish hold' means the bank…",o:["Hiked aggressively","Held rates but signaled easing bias","Banned trading","Raised margin"],a:1,e:"Tone/guidance can outweigh the decision itself."}]},
 {t:"CPI, NFP & The Economic Calendar",deep:{
  w:"CPI (inflation) steers rate expectations; NFP (US jobs, first Friday) reads economy health; PMI/GDP/PPI fill the picture. The economic calendar is your battle map — red events = high impact.",
  h:"Weekly routine: Sunday, mark every red event on your pairs. Note forecast vs prior. On release: hot CPI → hawkish pressure → USD up (usually); weak NFP → dovish → USD down. Trade the POST-spike trend once spreads normalize (5–15 min).",
  p:["Foreknowledge of WHEN volatility hits is free risk management","Post-news trends are often the cleanest intraday moves"],
  c:["First seconds are spread-blowout, slippage chaos","Revisions and details (wages inside NFP) can flip the headline reaction"],
  u:"Stand aside into the release; hunt the continuation after the repricing settles, aligned with the surprise direction.",
  n:"Never 'guess the number' with leverage — it's a coin flip with terrible execution. And never leave a tight-stop position running into a red event.",
  tip:"Ten minutes before red news: flat or protected, always. The market pays patience and executes gamblers."},
  quiz:[
  {q:"Hot CPI (above forecast) typically pushes USD…",o:["Down","Up — hawkish rate pressure","Nowhere","Off the charts"],a:1,e:"Higher inflation → higher-for-longer rates → dollar demand."},
  {q:"NFP is released…",o:["Daily","First Friday monthly","Quarterly","Randomly"],a:1,e:"Non-Farm Payrolls: monthly, first Friday, 18:00 IST (US morning)."},
  {q:"Professional news play:",o:["All-in 5 seconds before","Trade the post-release trend after spreads settle","Remove stops for freedom","Revenge the spike"],a:1,e:"Let the repricing happen, then join the winning side."}]},
 {t:"Instrument Profile: GOLD (XAUUSD)",deep:{
  w:"Gold is the anti-fiat asset: no yield, priced in USD, driven by real interest rates (nominal minus inflation), the dollar index, central-bank buying, and fear. Daily ranges of $20–60 are routine; news candles can travel $30 in minutes — this is a heavyweight, not a starter instrument.",
  h:"Drivers cheat-sheet: real yields UP → gold DOWN (yield-less asset loses appeal); DXY UP → gold DOWN (usually); war/crisis/bank-stress → gold UP; central banks accumulating → structural floor. Best sessions: London open and NY (COMEX) hours — Asia usually ranges. Trade it with SMC/liquidity logic: gold is the most stop-hunt-prone major instrument; sweeps of session highs/lows are its native language.",
  p:["Trends HARD when it trends — big clean legs for swing traders","Deep liquidity, tight spreads for its range","Reacts logically to macro (real yields/DXY) — a thinking trader's instrument","Volatility means small size still pays"],
  c:["Volatility cuts both ways: a casual 0.5-lot habit from EURUSD is 5× the risk here","Whipsaws and $10 wicks eat tight stops for breakfast","Requires macro awareness — pure chartists get blindsided by yield moves","Asia session chop tempts overtrading"],
  u:"Trade London/NY, after liquidity sweeps at session or daily extremes, with ATR-sized stops (typically $8–15 on M15 setups) and HALF your normal risk until proven.",
  n:"Avoid: minutes around FOMC/CPI/NFP (spreads triple), the Asia drift (fake moves), and any position sized like a forex pair. If your stop is under 1× ATR(14), you're donating.",
  tip:"Respect the ocean: veterans size gold at 30–50% of their FX risk and get paid MORE, because the range does the work. Your MT5 backtests already told you this — XAUUSD trends carried the MA strategy while chop killed everything else."},
  quiz:[
  {q:"Rising REAL yields typically push gold…",o:["Up","Down","Sideways forever","Off-market"],a:1,e:"Gold pays no yield — when bonds pay more after inflation, gold loses its bid."},
  {q:"Gold's best trading sessions are…",o:["Asia","London & New York","Weekend","Sydney only"],a:1,e:"COMEX + London flows create the real ranges; Asia mostly drifts."},
  {q:"Coming from EURUSD, your gold position size should be…",o:["Identical","Larger","Roughly a third to a half","Maximum"],a:2,e:"Same lots ≈ several times the dollar volatility. Size down, let the range pay."},
  {q:"Gold's market character is famous for…",o:["Never wicking","Frequent liquidity sweeps/stop hunts at key levels","Zero volatility","Ignoring the dollar"],a:1,e:"Sweep-and-reverse at session extremes is gold's signature move."}]}
]},
{ph:"Phase 7 · Intermarket Analysis",icon:"🔗",color:"#4FA8FF",lessons:[
 {t:"DXY, Bonds, Risk-On/Risk-Off",deep:{
  w:"Markets are one organism: DXY (dollar index) is the sun FX orbits; bond yields express rate expectations; equities express risk appetite. Risk-ON: stocks up, JPY/CHF/gold down, AUD/NZD up. Risk-OFF: the mirror.",
  h:"Before trading any USD pair, glance at DXY structure — trading EURUSD long while DXY breaks out upward is fighting the tide. Use US10Y yield direction as the macro compass for USDJPY and gold. Classify each day: risk-on, risk-off, or mixed — then pick pairs whose story agrees.",
  p:["One DXY chart filters bad trades across six pairs at once","Yield/gold and yield/USDJPY correlations are among the most reliable in macro"],
  c:["Correlations are regimes, not laws — they break precisely when you lean hardest","Adds analysis time; can become procrastination"],
  u:"Daily bias formation and confluence: EURUSD long + DXY at resistance + risk-on = aligned stars.",
  n:"Don't trade correlations directly ('gold moved, so USDJPY must…') — lead/lag is unstable intraday.",
  tip:"EURUSD is ~57% of DXY. If your EURUSD setup contradicts the DXY chart, one of your two analyses is wrong — find out which BEFORE entry."},
  quiz:[
  {q:"Risk-OFF days typically see flows INTO…",o:["AUD and stocks","JPY, CHF, gold, USD","Meme coins","Emerging markets"],a:1,e:"Fear buys safety: yen, franc, dollar, gold."},
  {q:"DXY breaking resistance while you're long EURUSD means…",o:["Perfect confluence","Direct conflict — dollar strength = EURUSD weakness","Nothing","Double the long"],a:1,e:"EURUSD is the biggest DXY component, inversely."},
  {q:"US 10-year yields ripping higher usually pressures…",o:["Nothing","Gold down, USDJPY up","Gold up","All currencies equally"],a:1,e:"Yield-less gold suffers; rate differentials lift USDJPY."}]}
]},
{ph:"Phase 8 · Risk Management",icon:"🛡️",color:"#2FD180",lessons:[
 {t:"Position Sizing & Risk of Ruin",deep:{
  w:"Position sizing converts your stop distance into lots such that a loss costs a FIXED small % of equity. Risk of ruin = the mathematical probability your strategy + sizing eventually zeroes the account. At 1% risk it's negligible; at 10% risk it approaches certainty.",
  h:"The only formula that matters: Lots = (Equity × Risk%) ÷ (SL pips × pip value per lot). Recompute EVERY trade from current equity (anti-martingale: risk shrinks in drawdown, grows in profit). Keep risk constant across instruments via ATR-based stops.",
  p:["Makes 10-loss streaks survivable (10 × 1% ≈ −9.6%)","Removes the biggest emotional lever — size — from in-trade decisions"],
  c:["Feels painfully slow when confident","Requires discipline precisely when euphoric or tilted"],
  u:"Every single trade, forever. Non-negotiable.",
  n:"There is no market condition where 'this one deserves 10%' is correct. That thought IS the risk.",
  tip:"Expected value, not win rate, pays you: EV = (Win% × AvgWin) − (Loss% × AvgLoss). A 35% win rate at 1:3 prints money; a 90% win rate risking 50:1 eventually detonates."},
  quiz:[
  {q:"$8,000 equity, 1% risk, 40-pip stop, $10/pip/lot →",o:["0.2 lots","2 lots","0.8 lots","0.02 lots"],a:0,e:"$80 ÷ 400 = 0.2 lots."},
  {q:"Risk of ruin rises fastest with…",o:["Small size","Bigger per-trade risk %","More screen time","Tight spreads"],a:1,e:"Ruin probability compounds explosively with risk size."},
  {q:"A 35% win-rate strategy at 1:3 RR is…",o:["A losing system","Profitable — positive EV","Break-even","Illegal"],a:1,e:"0.35×3 − 0.65×1 = +0.40R per trade."}]},
 {t:"Drawdown, Daily Limits & Kelly Caution",deep:{
  w:"Drawdown asymmetry: −20% needs +25% back; −50% needs +100%. Daily/weekly loss limits are circuit breakers for your psychology. Kelly criterion computes 'optimal' risk from edge — and full Kelly is violently volatile.",
  h:"Set three lines before the week starts: daily stop (−2 to −3%), weekly stop (−5%), monthly stop (−8%). Hit one → done, walk, journal. If you use Kelly at all, use QUARTER-Kelly as a ceiling, never a target.",
  p:["Limits convert catastrophic tilt days into small red days","Predefined stops remove in-the-moment negotiation with yourself"],
  c:["Stopping while 'feeling hot' takes real discipline","Kelly inputs (true win rate/RR) are never known precisely — garbage in, blowup out"],
  u:"Always. Prop firms enforce these rules because they're what separates professionals from donors.",
  n:"Never trade to 'win back' a limit breach — that's the exact behavior the limit exists to prevent. Never run full Kelly on estimated parameters.",
  tip:"Your daily limit is a tripwire for your worst self. The day you most want to ignore it is the day it's saving your account."},
  quiz:[
  {q:"After −50%, breakeven requires…",o:["+50%","+100%","+25%","+75%"],a:1,e:"You must double what remains."},
  {q:"Daily loss limit hit at 1pm. You…",o:["Double size","Stop, journal, return tomorrow","Remove SLs","Switch to gold"],a:1,e:"The limit's whole purpose is firing at this exact moment."},
  {q:"Full Kelly sizing in live trading is…",o:["Standard practice","Dangerous — inputs are estimates; drawdowns are brutal","Required by brokers","Conservative"],a:1,e:"Pros use fractional Kelly at most; parameter error compounds."}]}
]},
{ph:"Phase 9 · Trading Psychology",icon:"🧠",color:"#B08CFF",lessons:[
 {t:"Fear, Greed, Revenge & Tilt",deep:{
  w:"The four horsemen: FEAR (cutting winners early, skipping valid setups), GREED (oversizing, overstaying), REVENGE (instant re-entry bigger after a loss), OVERTRADING (boredom trades). Each is a predictable brain response to P&L, not a character flaw.",
  h:"Counter with mechanics, not willpower: fixed risk% kills greed's lever; a mandatory 15-minute cooldown after any loss kills revenge; a max-trades-per-day rule kills boredom; judging yourself on plan-adherence (not P&L) kills fear.",
  p:["Naming the pattern in real time ('this urge is revenge') breaks half its power","Rules make discipline automatic instead of heroic"],
  c:["Knowing ≠ doing — under drawdown the lizard brain runs hot","Rules feel restrictive exactly when emotions say they don't apply"],
  u:"Build the rules on a GREEN day; obey them on the red ones.",
  n:"Never make ANY trading decision within minutes of a stop-out. Nothing good is decided at heart-rate 120.",
  tip:"Loss → hands off the mouse, stand up, water, 15 minutes. This one physical rule is worth more than most courses."},
  quiz:[
  {q:"Instantly re-entering bigger after a stop-out is…",o:["Conviction","Revenge trading — the #1 account killer","Scaling in","Hedging"],a:1,e:"Emotion-driven size increase after pain is the classic blowup script."},
  {q:"The best defense against greed is…",o:["Meditation only","Hard-coded fixed risk per trade","Bigger targets","Hope"],a:1,e:"Remove the lever; the emotion has nothing to pull."},
  {q:"You should evaluate a trade by…",o:["Its P&L","Whether it followed your written plan","Screenshots likes","Speed"],a:1,e:"Process over outcome — P&L converges to process over 100s of trades."}]},
 {t:"Routine, Journaling & Burnout",deep:{
  w:"Elite performance is routine: pre-market prep, defined session, post-market review, real rest. Burnout — from 24/5 markets and revenge-screen-time — degrades decisions long before you notice.",
  h:"Daily loop: 15-min prep (calendar, HTF levels, bias written down) → trade your window ONLY → 10-min review (journal every trade: setup, emotion, grade A–D on execution). Weekly: read the journal, find your ONE most expensive repeated mistake, design a rule against it.",
  p:["A journal converts pain into data — your leaks become visible and fixable","Fixed windows protect life, sleep and edge simultaneously"],
  c:["Journaling feels pointless for weeks before patterns emerge","Routine is boring — which is exactly the point"],
  u:"From your very first practice trade. Habits install easiest before bad ones exist.",
  n:"Don't trade when sleep-deprived, sick, angry, or after big life events. 'Flat' is a position — often the most profitable one.",
  tip:"Review your journal weekly and fix ONE leak at a time. Traders who journal and review outperform not because they know more, but because they repeat less."},
  quiz:[
  {q:"The journal's highest-value output is…",o:["Pretty screenshots","Your repeated mistakes, quantified","Broker statements","Tax records"],a:1,e:"Self-generated behavioral data is the rarest edge."},
  {q:"'Flat is a position' means…",o:["Always be trading","Not trading is a valid, often optimal choice","Only trade flat markets","Hedge everything"],a:1,e:"No setup = no trade. Cash earns while you wait."},
  {q:"Best time to design discipline rules:",o:["Mid-drawdown at 2am","On a calm green day","During NFP","Never"],a:1,e:"Legislate in peace, execute in war."}]}
]},
{ph:"Phase 10 · Strategy Development",icon:"🧪",color:"#4FD8E8",lessons:[
 {t:"Rules, Backtesting & Curve-Fitting",deep:{
  w:"A strategy = written IF-THEN rules for setup, entry, stop, target, size, and session. Backtesting replays history against those rules; forward testing runs them live on paper. Curve-fitting = torturing parameters until history confesses — producing a strategy that only ever worked in the past.",
  h:"Pipeline: write rules → backtest 100+ trades across DIFFERENT regimes (trend/range/news) → check robustness (do nearby parameters also work? MA 48/52 should perform like 50) → forward test 1–3 months → deploy small. Log everything to CSV as you did with your MT5 suite — evidence over vibes.",
  p:["Rules make results measurable and improvable","Regime-tested strategies survive reality; your XAUUSD MA-crossover survived because trends persisted across regimes"],
  c:["Past ≠ future; even honest tests decay","Backtests silently flatter you: perfect fills, no spread spikes, no fear"],
  u:"Before risking one real dollar on ANY idea. No exceptions — the test costs nothing but time.",
  n:"Never optimize 8 parameters on 30 trades of one calm month — that's memorizing history. Never trust a backtest that ignores spread/slippage on news candles.",
  tip:"Robustness test: nudge every parameter ±20%. A real edge degrades gracefully; a curve-fit edge falls off a cliff."},
  quiz:[
  {q:"Curve-fitting is…",o:["Drawing trendlines","Over-optimizing parameters to fit past data","A chart pattern","Proper testing"],a:1,e:"It memorizes noise instead of learning signal."},
  {q:"A robust strategy should…",o:["Only work at exactly MA(50)","Perform similarly at nearby parameter values","Need re-optimization weekly","Have 20 parameters"],a:1,e:"Graceful degradation = real edge; cliff = fit."},
  {q:"Minimum credible sample before risking money:",o:["5 trades","100+ trades across regimes","1 great week","A YouTube video"],a:1,e:"Small samples are luck wearing a costume."}]}
]},
{ph:"Phase 11 · Algorithmic Trading",icon:"🤖",color:"#FF9A5C",lessons:[
 {t:"Python, MT5 API & Automation",deep:{

/* ═══════════ CHART (canvas) ═══════════ */
function drawChart(cvId,candles,upto,pos,trades){
  const cv=$(cvId);if(!cv)return;
  const W=cv.clientWidth,H=cv.clientHeight,dpr=window.devicePixelRatio||1;
  cv.width=W*dpr;cv.height=H*dpr;
  const x2=cv.getContext("2d");x2.scale(dpr,dpr);
  x2.fillStyle="#0B1220";x2.fillRect(0,0,W,H);
  const N=Math.min(90,upto),st=upto-N,view=candles.slice(st,upto);
  if(!view.length)return;
  let hi=-1e18,lo=1e18;view.forEach(c=>{hi=Math.max(hi,c.h);lo=Math.min(lo,c.l)});
  if(pos){[pos.entry,pos.sl,pos.tp].forEach(v=>{if(v){hi=Math.max(hi,v);lo=Math.min(lo,v)}})}
  const pad=(hi-lo)*.08||1;hi+=pad;lo-=pad;
  const Y=p=>H-(p-lo)/(hi-lo)*H,cw=W/N;
  x2.strokeStyle="#1A2438";for(let i=1;i<5;i++){x2.beginPath();x2.moveTo(0,H/5*i);x2.lineTo(W,H/5*i);x2.stroke()}
  x2.fillStyle="#5A6A8A";x2.font="10px ui-monospace,monospace";
  for(let i=0;i<=5;i++){const p=lo+(hi-lo)/5*i;x2.fillText(fx(p),4,Y(p)-3)}
  view.forEach((c,i)=>{const x=i*cw+cw/2,up=c.c>=c.o,col=up?"#2FD180":"#FF5C5C";
    x2.strokeStyle=col;x2.fillStyle=col;x2.lineWidth=Math.max(1,cw*.12);
    x2.beginPath();x2.moveTo(x,Y(c.h));x2.lineTo(x,Y(c.l));x2.stroke();
    const bw=Math.max(2,cw*.6),t=Y(Math.max(c.o,c.c)),b=Y(Math.min(c.o,c.c));
    x2.fillRect(x-bw/2,t,bw,Math.max(1,b-t))});
  if(pos){const ln=(p,col,lab)=>{if(!p)return;x2.strokeStyle=col;x2.setLineDash([5,4]);x2.lineWidth=1;
    x2.beginPath();x2.moveTo(0,Y(p));x2.lineTo(W,Y(p));x2.stroke();x2.setLineDash([]);
    x2.fillStyle=col;x2.font="10px ui-monospace,monospace";x2.fillText(lab+" "+fx(p),W-110,Y(p)-4)};
    ln(pos.entry,"#F5C542",pos.dir>0?"BUY":"SELL");ln(pos.sl,"#FF5C5C","SL");ln(pos.tp,"#2FD180","TP")}
  (trades||[]).forEach(t=>{if(t.i<st||t.i>=upto)return;const x=(t.i-st)*cw+cw/2;
    x2.fillStyle=t.pnl>=0?"#2FD180":"#FF5C5C";x2.font="12px sans-serif";x2.fillText(t.pnl>=0?"✔":"✖",x-5,14)});
  const la=view[view.length-1];x2.fillStyle=la.c>=la.o?"#2FD180":"#FF5C5C";
  x2.fillRect(W-64,Y(la.c)-9,62,16);x2.fillStyle="#0B1220";x2.font="bold 10px ui-monospace,monospace";x2.fillText(fx(la.c),W-60,Y(la.c)+3);
}

/* ═══════════ TRADE ENGINE ═══════════ */
let sim=null,simTimer=null;
function newSim(symbol,rules){
  stopSim();
  sim={symbol,rules,candles:gen(symbol,700,Math.floor(Math.random()*1e9)),idx:120,playing:false,speed:1,
       bal:10000,pos:null,hist:[],status:"active",fail:"",dayEq:10000,startBal:10000,cvId:rules?"dgcv":"prcv"};
  return sim;
}
function stopSim(){if(simTimer){clearInterval(simTimer);simTimer=null}if(sim)sim.playing=false}
const simPrice=()=>sim.candles[Math.min(sim.idx,sim.candles.length)-1].c;
const simEq=()=>sim.bal+(sim.pos?(simPrice()-sim.pos.entry)*sim.pos.dir*sim.pos.lots*SYM[sim.symbol].ct:0);
function simStep(){
  if(!sim||sim.status!=="active")return;
  if(sim.idx>=sim.candles.length){sim.playing=false;stopSim();updateSimUI();return}
  const c=sim.candles[sim.idx],sp=SYM[sim.symbol];
  if(sim.pos){let ex=null;const p=sim.pos;
    if(p.dir>0){if(p.sl&&c.l<=p.sl)ex=p.sl;else if(p.tp&&c.h>=p.tp)ex=p.tp}
    else{if(p.sl&&c.h>=p.sl)ex=p.sl;else if(p.tp&&c.l<=p.tp)ex=p.tp}
    if(ex!==null){const pnl=(ex-p.entry)*p.dir*p.lots*sp.ct;sim.bal+=pnl;
      sim.hist.push({i:sim.idx,dir:p.dir,pnl,entry:p.entry,exit:ex,lots:p.lots,sl:p.sl,openIdx:p.i});sim.pos=null;
      S.prog.tradeCount=(S.prog.tradeCount||0)+1}}
  sim.idx++;
  if(sim.rules){
    if(sim.idx%96===0)sim.dayEq=simEq();
    const eq=simEq(),r=sim.rules,sb=sim.startBal;
    const dd=(sim.dayEq-eq)/sb*100,tdd=(sb-eq)/sb*100,pf=(eq-sb)/sb*100;
    if(dd>=r.dailyDD){sim.status="failed";sim.fail="Daily drawdown breached (−"+r.dailyDD+"%)";sim.pos=null;stopSim()}
    else if(tdd>=r.maxDD){sim.status="failed";sim.fail="Max drawdown breached (−"+r.maxDD+"%)";sim.pos=null;stopSim()}
    else if(pf>=r.target&&sim.hist.length>=r.minTrades){sim.status="passed";stopSim()}
  }
  updateSimUI();
}
function simPlay(){if(!sim)return;sim.playing=!sim.playing;
  if(simTimer){clearInterval(simTimer);simTimer=null}
  if(sim.playing)simTimer=setInterval(simStep,Math.max(60,700/sim.speed));
  updateSimUI()}
function simSpeed(s){sim.speed=s;if(sim.playing){clearInterval(simTimer);simTimer=setInterval(simStep,Math.max(60,700/s))}updateSimUI()}
function simOpen(dir){
  if(!sim||sim.pos||sim.status!=="active")return;
  const lots=parseFloat($("tlots").value)||.1,slp=parseFloat($("tsl").value)||0,tpp=parseFloat($("ttp").value)||0;
  const sp=SYM[sim.symbol],u=sp.dg>=4?.0001:sp.base*.0004,pr=simPrice();
  sim.pos={dir,lots,entry:pr,sl:slp?pr-dir*slp*u:null,tp:tpp?pr+dir*tpp*u:null,i:sim.idx};updateSimUI()}
function simClose(){if(!sim||!sim.pos)return;const sp=SYM[sim.symbol],pr=simPrice(),p=sim.pos;
  const pnl=(pr-p.entry)*p.dir*p.lots*sp.ct;sim.bal+=pnl;
  sim.hist.push({i:sim.idx,dir:p.dir,pnl,entry:p.entry,exit:pr,lots:p.lots,sl:p.sl,openIdx:p.i});sim.pos=null;

/* ═══════════ COACH — rule-based session analysis ═══════════ */
function coachReport(h,startBal,candlesUsed){
  if(!h.length)return["No closed trades this session. Screen time without reps teaches nothing — take small positions and generate data to review."];
  const out=[],wins=h.filter(t=>t.pnl>0),losses=h.filter(t=>t.pnl<=0);
  const wr=wins.length/h.length*100;
  const gw=wins.reduce((a,t)=>a+t.pnl,0),gl=Math.abs(losses.reduce((a,t)=>a+t.pnl,0));
  const pf=gl?gw/gl:Infinity;
  const aw=wins.length?gw/wins.length:0,al=losses.length?gl/losses.length:0;
  const net=gw-gl;
  out.push(`📊 ${h.length} trades · ${wr.toFixed(0)}% win rate · profit factor ${pf===Infinity?"∞":pf.toFixed(2)} · net ${net>=0?"+":""}$${net.toFixed(2)}`);
  if(al>0&&aw/al<0.8&&wr<65)out.push("⚠️ Your average loss ($"+al.toFixed(0)+") outweighs your average win ($"+aw.toFixed(0)+"). Classic sign of cutting winners early and letting losers breathe. Aim for at least 1:1.5 realized RR.");
  if(aw/Math.max(al,1)>=1.5)out.push("✅ Healthy reward:risk — winners meaningfully larger than losers. This is the shape of a survivable system.");
  const noSL=h.filter(t=>!t.sl).length;
  if(noSL)out.push(`🚨 ${noSL} trade(s) had NO stop loss. In a funded challenge one such trade through news ends everything. Non-negotiable fix.`);
  // revenge: bigger lots right after a loss
  let rev=0;for(let i=1;i<h.length;i++)if(h[i-1].pnl<0&&h[i].lots>h[i-1].lots*1.5)rev++;
  if(rev)out.push(`🔥 Detected ${rev} size-up(s) immediately after a loss — the revenge-trading fingerprint. Rule: after any loss, next trade same size or smaller, after a 15-min pause.`);
  // overtrading
  const dens=h.length/Math.max(1,candlesUsed/96);
  if(dens>8)out.push(`⏳ ${dens.toFixed(0)} trades per simulated day is overtrading. A-grade setups are rare by definition; quantity is where edges go to die.`);
  // quick flips
  let scal=0;h.forEach(t=>{if(t.openIdx!==undefined&&t.i-t.openIdx<=2)scal++});
  if(scal>h.length/2)out.push("⚡ Most positions closed within 1–2 candles. If that's a plan, fine — if it's anxiety, your journal's 'emotion' column will tell you.");
  if(wr>=55&&pf>=1.5)out.push("🏆 Strong session. Now: could you repeat it with the same rules 20 more times? Consistency IS the strategy.");
  if(wr<35&&pf<1)out.push("🧭 Rough session — good. Cheap lessons. Review each entry: was there a sweep/structure reason, or just movement? Mark each trade A–D in the journal.");
  return out;
}

function dgHead(){
  const t=sim.rules,pf=(simEq()-sim.startBal)/sim.startBal*100;
  return `<div class="grid3" style="margin-bottom:12px">
   <div class="stat"><b class="${pf>=0?"bull":"bear"}">${pf.toFixed(2)}%</b><span>of +${t.target}% target</span></div>
   <div class="stat"><b>${sim.hist.length}</b><span>trades · min ${t.minTrades}</span></div>
   <div class="stat"><b class="gold">−${t.dailyDD}/−${t.maxDD}%</b><span>daily / max DD</span></div></div>`}

/* ---- Journal ---- */
const EMO=["calm","confident","fearful","greedy","revenge","bored"];
const MIS=["chased entry","moved SL","no SL","oversized","early exit","no setup","news gamble","overtraded"];
function vJournal(){
  const j=S.prog.journal||[];
  const wk=j.filter(e=>Date.now()-e.ts<7*864e5);
  const wins=wk.filter(e=>e.res==="win").length;
  const mc={};wk.forEach(e=>(e.mis||[]).forEach(m=>mc[m]=(mc[m]||0)+1));
  const topMis=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0];
  return `<div class="wrap"><h2>📓 Trading Journal</h2><p class="sub">Log every trade — practice included. Your mistakes are your edge, once counted.</p>
  <div class="card" style="margin-bottom:14px"><b>New entry</b>
   <div class="grid3" style="margin:10px 0">
    <input id="jpair" class="inp" style="padding:9px" placeholder="Pair" value="XAUUSD">
    <select id="jdir" class="inp" style="padding:9px"><option>long</option><option>short</option></select>
    <select id="jres" class="inp" style="padding:9px"><option>win</option><option>loss</option><option>breakeven</option></select></div>
   <div class="grid2" style="margin-bottom:10px">
    <select id="jemo" class="inp" style="padding:9px">${EMO.map(e=>`<option>${e}</option>`).join("")}</select>
    <select id="jgrade" class="inp" style="padding:9px"><option>A — followed plan</option><option>B — minor deviation</option><option>C — broke a rule</option><option>D — no plan at all</option></select></div>
   <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px" id="jmis">
    ${MIS.map(m=>`<button class="chan" data-m="${m}" onclick="this.classList.toggle('on')">${m}</button>`).join("")}</div>
   <textarea id="jnote" class="inp" style="min-height:70px" placeholder="What did you see? What was the plan? What actually happened?"></textarea>
   <button class="btn" style="width:100%;margin-top:10px" onclick="addJ()">Save entry (+5 XP)</button></div>
  <div class="card" style="margin-bottom:14px;border-color:var(--gold)"><b class="gold">📈 Weekly review</b>
   <p style="font-size:13.5px;color:#C4CFE4;margin-top:8px">${wk.length?`${wk.length} entries · ${wins} wins (${(wins/wk.length*100).toFixed(0)}%)${topMis?` · most repeated mistake: <b>${esc(topMis[0])}</b> ×${topMis[1]} — write one rule against it this week.`:" · no repeated mistakes logged. Either flawless… or under-logging."}`:"No entries in the last 7 days. The review can only be as honest as the log."}</p></div>
  ${j.slice().reverse().map(e=>`<div class="card" style="margin-bottom:10px">
   <div class="row" style="justify-content:space-between"><b>${esc(e.pair)} ${e.dir==="long"?"▲":"▼"} <span class="${e.res==="win"?"bull":e.res==="loss"?"bear":"dim"}">${e.res}</span></b>
   <span class="mono dim" style="font-size:11px">${new Date(e.ts).toLocaleDateString()}</span></div>
   <div style="font-size:12px;margin-top:5px"><span class="pill">${esc(e.emo)}</span> <span class="pill">${esc(e.grade)}</span> ${(e.mis||[]).map(m=>`<span class="pill" style="color:var(--bear);border-color:#4A2430">${esc(m)}</span>`).join(" ")}</div>
   ${e.note?`<p style="font-size:13px;color:#C4CFE4;margin-top:8px">${esc(e.note)}</p>`:""}</div>`).join("")}</div>`}
function addJ(){
  const mis=[...document.querySelectorAll("#jmis .chan.on")].map(b=>b.dataset.m);
  S.prog.journal=[...(S.prog.journal||[]),{ts:Date.now(),pair:$("jpair").value,dir:$("jdir").value,res:$("jres").value,emo:$("jemo").value,grade:$("jgrade").value.slice(0,1),mis,note:$("jnote").value.trim()}];
  addXP(5);render();toast("Entry saved 📓")}

/* ---- Community ---- */
let curChan="beginner-help";
function vCommunity(){
  return `<div class="wrap" style="display:flex;flex-direction:column;height:calc(100vh - 150px)">
  <h2>💬 Community</h2><p class="sub">Open channels — every member sees every message.${remote()?"":" (Local mode: messages stay on this device until Supabase is connected.)"}</p>
  <div class="row" style="overflow-x:auto;padding-bottom:6px">${CHANNELS.map(c=>`<button class="chan ${curChan===c?"on":""}" onclick="curChan='${c}';loadChat();render()"># ${c}</button>`).join("")}</div>
  <div class="card" id="chatbox" style="flex:1;overflow-y:auto;margin:10px 0"><span class="dim" style="font-size:13px">Loading…</span></div>
  <div class="row"><input id="cmsg" class="inp" style="flex:1" placeholder="Message # ${curChan}" onkeydown="if(event.key==='Enter')sendChat()">
  <button class="btn" style="padding:12px 16px" onclick="sendChat()">Send</button></div></div>`}
async function loadChat(){
  const box=$("chatbox");if(!box)return;
  const m=await kvGet(K.chat(curChan),[]);
  box.innerHTML=m.length?m.map(x=>`<div style="margin-bottom:10px;${x.u===S.user.name?"text-align:right":""}">
   <div class="mono" style="font-size:10px;color:${x.u==="pavan"?"var(--gold)":"var(--dim)"};margin-bottom:2px">${x.u==="pavan"?"👑 pavan (mentor)":esc(x.u)} · ${new Date(x.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
   <div style="display:inline-block;padding:8px 12px;border-radius:12px;font-size:14px;max-width:85%;text-align:left;word-break:break-word;background:${x.u===S.user.name?"#2A3552":"#0E1626"};border:1px solid ${x.u==="pavan"?"var(--gold)":"var(--line)"}">${esc(x.t)}</div></div>`).join("")
  :'<span class="dim" style="font-size:13px">No messages in #'+curChan+' yet. Open the discussion.</span>';
  box.scrollTop=box.scrollHeight;
}
async function sendChat(){
  const v=$("cmsg").value.trim();if(!v)return;$("cmsg").value="";
  const m=await kvGet(K.chat(curChan),[]);
  m.push({u:S.user.name,t:v.slice(0,500),ts:Date.now()});
  await kvSet(K.chat(curChan),m.slice(-120));loadChat();
}

/* ---- Support ---- */
function vSupport(){return `<div class="wrap"><h2>🛟 Support</h2>
 <p class="sub">Saved to the mentor's inbox here, and your mail app opens pre-addressed so it also reaches his email.</p>
 <div class="card"><label class="dim" style="font-size:12px">Subject</label>
 <input id="ssub" class="inp" style="margin:6px 0 14px" placeholder="e.g. Doubt in order blocks lesson">
 <label class="dim" style="font-size:12px">Message</label>
 <textarea id="sbody" class="inp" style="margin:6px 0 14px;min-height:120px"></textarea>
 <button class="btn" style="width:100%" onclick="sendSupport()">Send to mentor</button>
 <div id="sok" class="bull" style="font-size:13px;margin-top:10px"></div></div></div>`}
async function sendSupport(){
  const b=$("sbody").value.trim();if(!b)return;
  const arr=await kvGet(K.support,[]);
  arr.push({u:S.user.name,subject:$("ssub").value.trim()||"(no subject)",body:b,ts:Date.now()});
  await kvSet(K.support,arr.slice(-200));
  window.open(`mailto:${MENTOR_EMAIL}?subject=${encodeURIComponent("[FX-OS] "+($("ssub").value||"Support")+" — from "+S.user.name)}&body=${encodeURIComponent(b)}`,"_blank");
  $("sok").textContent="✓ Saved to mentor inbox — email draft opened.";$("ssub").value="";$("sbody").value="";
}

/* ---- Admin ---- */
function vAdmin(){return `<div class="wrap"><h2>👑 Mentor Console</h2>
 <p class="sub">${remote()?"🟢 Supabase connected — global sync active":"🟡 Local mode — fill SUPABASE config in this file for global logins, chat & leaderboard"}</p>
 <div class="card" style="margin-bottom:12px"><b>Create student login</b>
  <input id="au" class="inp" style="margin:10px 0 8px" placeholder="username" autocapitalize="none">
  <input id="ap" class="inp" style="margin-bottom:10px" placeholder="password">
  <button class="btn" style="width:100%" onclick="addUser()">Create user</button></div>
 <div class="card" style="margin-bottom:12px"><b>Members</b><div id="ulist" class="dim" style="font-size:13px;margin-top:8px">Loading…</div></div>
 <div class="card" style="margin-bottom:12px"><b>Support inbox</b><div id="inbox" class="dim" style="font-size:13px;margin-top:8px">Loading…</div></div>
 <div class="card"><b>Settings</b>
  <div class="row" style="margin:10px 0"><input id="apw" class="inp" type="password" style="flex:1" placeholder="new admin password">
  <button class="ghost" style="color:var(--gold);border-color:var(--gold)" onclick="chPw()">Update</button></div>
  <button class="ghost" style="width:100%;color:var(--bear);border-color:var(--bear)" onclick="clearChan()">Clear # ${curChan} channel</button></div></div>`}
async function loadAdmin(){
  const users=await kvGet(K.users,{}),ul=$("ulist");
  if(ul)ul.innerHTML=Object.entries(users).map(([n,r])=>`<div class="row" style="justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)">
   <span><b style="color:var(--text)">${r.role==="admin"?"👑 ":""}${esc(n)}</b> <span class="mono" style="font-size:10px">${new Date(r.created).toLocaleDateString()}</span></span>
   ${n!=="pavan"?`<button class="ghost" style="padding:5px 10px;font-size:12px;color:var(--bear);border-color:var(--bear)" onclick="rmUser('${esc(n)}')">Remove</button>`:""}</div>`).join("");
  const inbox=await kvGet(K.support,[]),ib=$("inbox");
  if(ib)ib.innerHTML=inbox.length?inbox.slice().reverse().map(m=>`<div style="border-bottom:1px solid var(--line);padding:9px 0">
   <div class="mono gold" style="font-size:11px">${esc(m.u)} · ${new Date(m.ts).toLocaleString()}</div>
   <b style="color:var(--text);font-size:14px">${esc(m.subject)}</b>
   <p style="font-size:13px;color:#C4CFE4;margin-top:3px">${esc(m.body)}</p></div>`).join(""):"No messages yet.";
}
async function addUser(){
  const n=$("au").value.trim().toLowerCase(),p=$("ap").value;
  if(!n||!p)return toast("Enter username and password");
  const u=await kvGet(K.users,{});if(u[n])return toast("Username exists");
  u[n]={p:btoa(p),role:"student",created:Date.now()};await kvSet(K.users,u);
  $("au").value="";$("ap").value="";toast("Created '"+n+"' ✓");loadAdmin();
}
async function rmUser(n){const u=await kvGet(K.users,{});delete u[n];await kvSet(K.users,u);toast("Removed "+n);loadAdmin()}
async function chPw(){const p=$("apw").value;if(!p)return;const u=await kvGet(K.users,{});u.pavan.p=btoa(p);await kvSet(K.users,u);$("apw").value="";toast("Admin password updated ✓")}
async function clearChan(){await kvSet(K.chat(curChan),[]);toast("#"+curChan+" cleared")}

/* ═══════════ ROUTER ═══════════ */
const NAV=[["home","🏠","Home"],["academy","📚","Academy"],["practice","📈","Practice"],["dungeon","⚔️","Dungeon"],["journal","📓","Journal"],["community","💬","Chat"],["support","🛟","Help"]];
function render(){
  const app=$("app");
  if(S.chatTimer){clearInterval(S.chatTimer);S.chatTimer=null}
  if(!S.user){app.innerHTML=vLogin();return}
  const nav=S.user.role==="admin"?[...NAV,["admin","👑","Admin"]]:NAV;
  const tick=Object.entries(SYM).map(([s,v])=>{const c=gen(s,50,42);const l=c[c.length-1].c,p=c[c.length-2].c;
    return `<span><span class="dim">${s} </span><span class="${l>=p?"bull":"bear"}">${fx(l)} ${l>=p?"▲":"▼"}</span></span>`}).join("");
  const body={home:vHome,academy:vAcademy,lesson:vLesson,dc:vDC,practice:vPractice,dungeon:vDungeon,journal:vJournal,community:vCommunity,support:vSupport,admin:vAdmin}[S.tab]();
  app.innerHTML=`
  <header><div class="row" style="justify-content:space-between;padding:10px 16px">
   <b style="letter-spacing:-.5px">FX-<span class="gold">OS</span></b>
   <div class="row"><span class="mono gold" style="font-size:11px">⚡${S.prog.xp||0}</span>
    <span class="mono gold" style="font-size:11px">🔥${S.prog.streak||0}</span>
    <span class="mono dim" style="font-size:11px">${esc(S.user.name)}</span>
    <button class="ghost" style="padding:5px 10px;font-size:11px" onclick="logout()">Out</button></div></div>
   <div class="ticker"><div>${tick}${tick}</div></div></header>
  <main style="padding-bottom:92px">${body}</main>
  <nav class="bottom">${nav.map(([id,ic,lb])=>`<button class="${S.tab===id?"on":""}" onclick="stopSim();S.tab='${id}';render()"><div class="ic">${ic}</div>${lb}</button>`).join("")}</nav>`;
  if(S.tab==="home")loadBoard();
  if(S.tab==="practice"||(S.tab==="dungeon"&&S.view.tier!==undefined))updateSimUI();
  if(S.tab==="community"){loadChat();S.chatTimer=setInterval(loadChat,4000)}
  if(S.tab==="admin")loadAdmin();
}
render();
</script>
</body>
</html>
